<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>JP Fit Client Intake</title><link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;800&family=Inter:wght@400;600;800&display=swap" rel="stylesheet"><style>:root{--lime:#caff38;--black:#080808;--paper:#f1f0eb;--line:#dad9d2}*{box-sizing:border-box}body{margin:0;background:var(--paper);font-family:Inter,sans-serif}.header{background:#080808;color:#fff;padding:24px}.brand{width:min(900px,100%);margin:auto;display:flex;align-items:center;gap:12px}.brand img{width:50px;height:50px;border-radius:50%;border:2px solid var(--lime)}.brand strong{font-family:"Barlow Condensed";font-size:1.6rem}.wrap{width:min(900px,calc(100% - 30px));margin:35px auto}.card{background:#fff;border:1px solid var(--line);border-radius:25px;padding:32px}h1,h2{font-family:"Barlow Condensed";text-transform:uppercase;line-height:.95}h1{font-size:3.8rem;margin:8px 0}.eyebrow{color:#668800;font-size:.7rem;font-weight:800;letter-spacing:.13em}.grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}.field{font-size:.78rem;font-weight:800}.field.full{grid-column:1/-1}.field input,.field select,.field textarea{width:100%;margin-top:7px;padding:13px;border:1px solid var(--line);border-radius:10px}.section{border-top:1px solid var(--line);padding-top:20px;margin-top:24px}.btn{border:0;border-radius:999px;background:var(--lime);padding:15px 24px;font-weight:800;width:100%;cursor:pointer}.notice{display:none;background:#eff8dc;border-left:4px solid #79a000;padding:15px;margin-top:16px}@media(max-width:650px){.grid{grid-template-columns:1fr}.field.full{grid-column:auto}.card{padding:24px 16px}}</style></head><body><header class="header"><div class="brand"><img src="assets/jp-fit-logo.jpg"><strong>JP FIT CLIENT INTAKE</strong></div></header><main class="wrap"><form class="card" id="intake"><span class="eyebrow">YOUR STARTING POINT</span><h1>Client Intake</h1><p>This information helps Jeremy build a safe, realistic, and personalized plan.</p><div class="grid"><label class="field">Name<input id="name" required></label><label class="field">Email<input id="email" type="email" required></label><label class="field">Age<input type="number" name="age"></label><label class="field">Height<input name="height"></label><label class="field">Current weight<input name="weight"></label><label class="field">Occupation<input name="occupation"></label><label class="field full">Primary goal<textarea name="goal" rows="3" required></textarea></label><label class="field full">Why is this goal important to you?<textarea name="why" rows="3"></textarea></label></div><section class="section"><h2>Training</h2><div class="grid"><label class="field">Experience level<select name="experience"><option>Beginner</option><option>Intermediate</option><option>Advanced</option></select></label><label class="field">Equipment access<input name="equipment"></label><label class="field full">Current activity and training schedule<textarea name="activity" rows="3"></textarea></label><label class="field full">Preferred days and times<textarea name="schedule" rows="3"></textarea></label></div></section><section class="section"><h2>Health & Safety</h2><div class="grid"><label class="field full">Injuries, surgeries, pain, diagnoses, medications, or restrictions<textarea name="health" rows="4" required></textarea></label><label class="field full">Has a medical professional advised against exercise or required restrictions?<textarea name="clearance" rows="3"></textarea></label></div></section><section class="section"><h2>Nutrition & Lifestyle</h2><div class="grid"><label class="field full">Describe a typical day of eating<textarea name="nutrition" rows="4"></textarea></label><label class="field">Average sleep<input name="sleep"></label><label class="field">Average daily steps<input name="steps"></label><label class="field full">Anything else Jeremy should know?<textarea name="other" rows="4"></textarea></label></div></section><button class="btn" type="submit">SAVE MY INTAKE</button><div class="notice" id="notice">Intake saved on this device. Email or secure backend submission will be connected in the production portal.</div></form></main><script>const r=JSON.parse(localStorage.getItem("jpfitEnrollment")||"null");if(r){name.value=r.client.name||"";email.value=r.client.email||""}document.getElementById("intake").addEventListener("submit",e=>{e.preventDefault();const data=Object.fromEntries(new FormData(e.target));data.name=name.value;data.email=email.value;localStorage.setItem("jpfitIntake",JSON.stringify(data));document.getElementById("notice").style.display="block";window.scrollTo({top:document.body.scrollHeight,behavior:"smooth"})})</script></body></html>
